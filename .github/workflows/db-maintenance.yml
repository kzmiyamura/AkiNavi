name: DB Maintenance

on:
  schedule:
    - cron: '0 2 * * *'   # 毎日 02:00 UTC: Materialized View 更新
    - cron: '10 2 * * *'  # 毎日 02:10 UTC: 古い view_logs 削除
  workflow_dispatch:

jobs:
  refresh-materialized-view:
    name: Refresh daily_room_stats
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Refresh Materialized View
        run: |
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/refresh_daily_stats" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json"

  purge-old-view-logs:
    name: Purge view_logs older than 3 months
    runs-on: ubuntu-latest
    if: github.event.schedule == '10 2 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Delete old view_logs
        run: |
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/purge_old_view_logs" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json"
